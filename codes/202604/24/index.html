<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비동기 데이터 처리 및 시각화</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #app { max-width: 800px; margin: 0 auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        #chart-container { width: 100%; height: 300px; margin-top: 20px; border: 1px solid #eee; }
        .loading { text-align: center; font-size: 1.2em; color: #555; }
        .error { color: red; text-align: center; }
    </style>
</head>
<body>
    <div id="app">
        <h1>비동기 데이터 시각화 프로젝트</h1>
        <p>외부 API에서 데이터를 가져와 가공한 후 차트로 시각화하는 예제입니다.</p>
        <button id="loadDataBtn">데이터 불러오기</button>
        <div id="status"></div>
        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <!-- Chart.js 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 모듈 스크립트 로드 -->
    <script type="module" src="main.js"></script>
</body>
</html>
